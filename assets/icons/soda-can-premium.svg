<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sleek can body -->
  <rect x="25" y="20" width="50" height="110" rx="10" ry="10" fill="url(#bodyGradient)" stroke="#555" stroke-width="2"/>
  <rect x="28" y="25" width="44" height="100" rx="8" ry="8" fill="url(#highlight)" opacity="0.3"/>
  
  <!-- Sovereign Glow -->
  <circle cx="50" cy="75" r="20" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.5" stroke-dasharray="2 2"/>
  <circle cx="50" cy="75" r="10" fill="#00ffff" opacity="0.1"/>
  
  <!-- Modern pull tab -->
  <path d="M48 20 L52 20 L55 10 L45 10 Z" fill="#444" stroke="#666" stroke-width="1"/>
  
  <text x="50" y="145" font-family="monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="1">SOVEREIGN</text>
</svg>

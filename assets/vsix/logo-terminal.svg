<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="terminalTextGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008f11;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terminalCanGradientLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="terminalGlowLogo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon Section -->
  <g transform="translate(10, 10) scale(0.6)">
    <path d="M64 12 L108 36 L108 92 L64 116 L20 92 L20 36 Z" fill="#0c0c0c" stroke="#333" stroke-width="2"/>
    <rect x="44" y="30" width="40" height="70" rx="8" fill="url(#terminalCanGradientLogo)" stroke="#222" stroke-width="1"/>
    <text x="52" y="74" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff41" filter="url(#terminalGlowLogo)">>_</text>
  </g>

  <!-- Text Section -->
  <text x="100" y="65" font-family="monospace, sans-serif" font-size="42" font-weight="900" fill="url(#terminalTextGradient)" letter-spacing="2">DIETCODE: SHELL</text>
  <text x="100" y="85" font-family="sans-serif" font-size="12" font-weight="300" fill="#008f11" letter-spacing="2" opacity="0.8">SOVEREIGN TERMINAL ORCHESTRATION</text>
  
  <!-- Scanline effect -->
  <rect x="100" y="40" width="280" height="30" fill="url(#terminalTextGradient)" opacity="0.05"/>
  <rect x="100" y="92" width="290" height="1" fill="#111"/>
  <rect x="100" y="92" width="80" height="1" fill="#00ff41"/>
</svg>

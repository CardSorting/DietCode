<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="terminalCanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terminalPromptGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008f11;stop-opacity:1" />
    </linearGradient>
    <filter id="terminalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Hexagon -->
  <path d="M64 12 L108 36 L108 92 L64 116 L20 92 L20 36 Z" fill="#0c0c0c" stroke="#333" stroke-width="2"/>
  <path d="M64 18 L102 39 L102 89 L64 110 L26 89 L26 39 Z" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.1"/>

  <!-- Soda Can Body -->
  <rect x="44" y="30" width="40" height="70" rx="8" fill="url(#terminalCanGradient)" stroke="#222" stroke-width="1"/>
  
  <!-- Terminal Screen on the Can -->
  <rect x="48" y="55" width="32" height="30" rx="2" fill="#000" stroke="#00ff41" stroke-width="0.5" opacity="0.8"/>
  
  <!-- Terminal Prompt -->
  <text x="52" y="74" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff41" filter="url(#terminalGlow)">>_</text>

  <!-- Lightning "Zap" in Terminal Green -->
  <path d="M68 40 L52 55 L64 55 L60 70 L76 55 L64 55 Z" fill="#00ff41" opacity="0.3"/>
</svg>

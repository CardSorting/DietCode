<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="canGradientLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <filter id="glowLogo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon Section -->
  <g transform="translate(10, 10) scale(0.6)">
    <path d="M64 12 L108 36 L108 92 L64 116 L20 92 L20 36 Z" fill="#0c0c0c" stroke="#333" stroke-width="2"/>
    <rect x="44" y="30" width="40" height="70" rx="8" fill="url(#canGradientLogo)" stroke="#444" stroke-width="1"/>
    <path d="M68 45 L52 65 L64 65 L60 85 L76 65 L64 65 Z" fill="#00f2ff" filter="url(#glowLogo)"/>
  </g>

  <!-- Text Section -->
  <text x="100" y="65" font-family="monospace, sans-serif" font-size="48" font-weight="900" fill="url(#textGradient)" letter-spacing="4">DIETCODE</text>
  <text x="100" y="85" font-family="sans-serif" font-size="12" font-weight="300" fill="#888" letter-spacing="2">SOVEREIGN HIVE ARCHITECTURE</text>
  
  <!-- Accent Line -->
  <rect x="100" y="92" width="290" height="1" fill="#333"/>
  <rect x="100" y="92" width="50" height="1" fill="#00f2ff"/>
</svg>
